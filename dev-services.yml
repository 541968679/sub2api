project:
  id: api2sub
  name: Sub2API
network:
  host: 127.0.0.1
  ports:
    backend: 18081
    frontend: 15174
    aiclient2api: 3000
    aiclient2api_master: 3100
    new_api: 13200

services:
  backend:
    label: Backend API
    role: managed
    cwd: .
    command: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\dev-stack.ps1 run -Component backend -SkipAIClient
    env:
      GIN_MODE: release
    ports: [${ports.backend}]
    health: http://${network.host}:${ports.backend}/health
    open_url: http://${network.host}:${ports.backend}/health
    reload: true

  frontend:
    label: Frontend
    role: managed
    cwd: .
    command: powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\dev-stack.ps1 run -Component frontend -SkipAIClient
    ports: [${ports.frontend}]
    health: http://${network.host}:${ports.frontend}
    open_url: http://${network.host}:${ports.frontend}
    reload: true

  aiclient2api:
    label: AIClient2API
    role: monitor
    ports: [${ports.aiclient2api}, ${ports.aiclient2api_master}]
    open_url: http://${network.host}:${ports.aiclient2api}
    reload: false

  new-api:
    label: new-api
    role: monitor
    ports: [${ports.new_api}]
    open_url: http://${network.host}:${ports.new_api}
    reload: false

groups:
  core:
    label: Core
    services: [backend, frontend]
  optional:
    label: Optional Sidecars
    services: [aiclient2api, new-api]
